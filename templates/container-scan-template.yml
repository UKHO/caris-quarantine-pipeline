parameters:
  - name: sourceRegistryServiceConnection
    type: string
  - name: destinationRegistryServiceConnection
    type: string
  - name: preRegistryServiceConnection
    type: string
  - name: destinationRegistry
    type: string
  - name: preRegistry
    type: string
  - name: snykServiceConnection
    type: string
  - name: snykOrganization
    type: string
  - name: teamsWebhookEndpoint
    type: string
  - name: sourceRepository
    type: string
  - name: sourceTag
    type: string
  - name: sourceHost
    type: string

stages:
- stage: ScanContainer
  displayName: 'Scan Container'
  condition: succeeded()
  jobs:
  - job: ContainerScan
    displayName: 'Scan Pushed Image'
    pool:
      name: Tiberius
      demands:
      - ENVIRONMENT -equals BUS
    steps:
    - powershell: |
        $name = "$(Build.BuildNumber) $('${{ parameters.sourceRepository }}'.Replace('/', '-')) ${{ parameters.sourceTag }}"
        Write-Host "##vso[build.updatebuildnumber]$name"
      displayName: 'Set pipeline run name'

    - task: Docker@2
      displayName: 'Login to Source Registry'
      inputs:
        containerRegistry: '${{ parameters.sourceRegistryServiceConnection }}'
        command: 'login'

    - task: Docker@2
      displayName: 'Login to Destination Registry for Status Check'
      inputs:
        containerRegistry: '${{ parameters.destinationRegistryServiceConnection }}'
        command: 'login'

    - task: PowerShell@2
      name: checkPreviousStatus
      displayName: 'Check previous scan status'
      inputs:
        targetType: 'inline'
        script: |
          $scannedImage = "${{ parameters.destinationRegistry }}/scanned/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-snyk-scanned"
          $vulnerableImage = "${{ parameters.destinationRegistry }}/vulnerable/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-vulnerable"

          $previousStatus = 'new'

          docker manifest inspect $scannedImage 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            $previousStatus = 'clean'
            Write-Host "Found existing scanned image: $scannedImage"
          }

          docker manifest inspect $vulnerableImage 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            $previousStatus = 'vulnerable'
            Write-Host "Found existing vulnerable image: $vulnerableImage"
          }

          Write-Host "Previous scan status: $previousStatus"
          Write-Host "##vso[task.setvariable variable=previousStatus;isOutput=true]$previousStatus"

    - task: PowerShell@2
      displayName: 'Pull Published Image'
      inputs:
        targetType: 'inline'
        script: |
          docker pull ${{ parameters.sourceHost }}/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}

    - task: UkhoSnykScanTask@0
      displayName: 'Snyk container scan'
      inputs:
        failOnIssues: true
        organization: '${{ parameters.snykOrganization }}'
        serviceConnectionEndpoint: '${{ parameters.snykServiceConnection }}'
        testType: container
        monitorWhen: always
        severityThreshold: high
        dockerImageName: '${{ parameters.sourceHost }}/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}'

- stage: PushToPreACR
  displayName: 'Push scanned image to Pre ACR'
  dependsOn: ScanContainer
  condition: succeeded('ScanContainer')
  jobs:
  - job: PushToPre
    displayName: 'Push to Pre ACR'
    pool:
      name: Tiberius
      demands:
      - ENVIRONMENT -equals ENG
    variables:
      scannedImageTag: '${{ parameters.sourceTag }}-snyk-scanned'
      preImageRepository: 'scanned/${{ parameters.sourceRepository }}'
      fullPreImageName: '${{ parameters.preRegistry }}/scanned/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-snyk-scanned'
    steps:
    - template: steps/docker-copy-image.yml
      parameters:
        sourceRegistryServiceConnection: '${{ parameters.sourceRegistryServiceConnection }}'
        sourceHost: '${{ parameters.sourceHost }}'
        sourceRepository: '${{ parameters.sourceRepository }}'
        sourceTag: '${{ parameters.sourceTag }}'
        targetRegistryServiceConnection: '${{ parameters.preRegistryServiceConnection }}'
        targetRegistryDisplayName: 'Login to Pre Registry'
        targetImageName: '$(fullPreImageName)'
        targetRepository: '$(preImageRepository)'
        targetTag: '$(scannedImageTag)'
        tagDisplayName: 'Tag Image for Pre'
        pushDisplayName: 'Push Scanned Image to Pre Registry'

- stage: PushToPrivateRepo
  displayName: 'Push passed image to Live ACR'
  dependsOn: PushToPreACR
  condition: succeeded('PushToPreACR')
  jobs:
  - job: PullTagAndPush
    displayName: 'Pull, Tag and Push the image to the Private ACR'
    pool:
      name: Tiberius
      demands:
      - ENVIRONMENT -equals BUS
    variables:
      scannedImageTag: '${{ parameters.sourceTag }}-snyk-scanned'
      destinationImageRepository: 'scanned/${{ parameters.sourceRepository }}'
      fullDestinationImageName: '${{ parameters.destinationRegistry }}/scanned/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-snyk-scanned'
    steps:
    - template: steps/docker-copy-image.yml
      parameters:
        sourceRegistryServiceConnection: '${{ parameters.sourceRegistryServiceConnection }}'
        sourceHost: '${{ parameters.sourceHost }}'
        sourceRepository: '${{ parameters.sourceRepository }}'
        sourceTag: '${{ parameters.sourceTag }}'
        targetRegistryServiceConnection: '${{ parameters.destinationRegistryServiceConnection }}'
        targetRegistryDisplayName: 'Login to Destination Registry'
        targetImageName: '$(fullDestinationImageName)'
        targetRepository: '$(destinationImageRepository)'
        targetTag: '$(scannedImageTag)'
        tagDisplayName: 'Tag Image as Snyk Scanned'
        pushDisplayName: 'Push Scanned Image to Destination Registry'

- stage: AlertOnSuccess
  displayName: 'Alert that scan completed successfully'
  dependsOn: [ScanContainer, PushToPreACR, PushToPrivateRepo]
  condition: and(succeeded('PushToPreACR'), succeeded('PushToPrivateRepo'))
  jobs:
  - job: SendSuccessTeamsMessage
    displayName: 'Send Success Alert to Teams Channel'
    condition: ne(stageDependencies.ScanContainer.ContainerScan.outputs['checkPreviousStatus.previousStatus'], 'clean')
    pool: Mare Nectaris
    variables:
      scannedImageTag: '${{ parameters.sourceTag }}-snyk-scanned'
      fullDestinationImageName: '${{ parameters.destinationRegistry }}/scanned/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-snyk-scanned'
      fullPreImageName: '${{ parameters.preRegistry }}/scanned/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-snyk-scanned'
      previousStatus: $[ stageDependencies.ScanContainer.ContainerScan.outputs['checkPreviousStatus.previousStatus'] ]
    steps:
    - template: steps/send-teams-alert.yml
      parameters:
        teamsWebhookEndpoint: '${{ parameters.teamsWebhookEndpoint }}'
        payload:
          title: 'Container Scan Completed Successfully'
          message: 'Container scanning passed and image has been pushed to live and pre private registries. Previous status: $(previousStatus).'
          previousStatus: '$(previousStatus)'
          status: 'success'
          sourceHost: '${{ parameters.sourceHost }}'
          sourceRepository: '${{ parameters.sourceRepository }}'
          sourceTag: '${{ parameters.sourceTag }}'
          destinationImage: '$(fullDestinationImageName)'
          preImage: '$(fullPreImageName)'
          pipelineUrl: '$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)'

- stage: AlertOnFail
  displayName: 'Alert that vulnerable image present'
  dependsOn: ScanContainer
  condition: failed('ScanContainer')
  jobs:
  - job: PushPreVulnerableImage
    displayName: 'Push Vulnerable Image to Pre ACR'
    pool:
      name: Tiberius
      demands:
      - ENVIRONMENT -equals ENG
    variables:
      vulnerableImageTag: '${{ parameters.sourceTag }}-vulnerable'
      preVulnerableImageRepository: 'vulnerable/${{ parameters.sourceRepository }}'
      fullPreVulnerableImageName: '${{ parameters.preRegistry }}/vulnerable/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-vulnerable'
    steps:
    - template: steps/docker-copy-image.yml
      parameters:
        sourceRegistryServiceConnection: '${{ parameters.sourceRegistryServiceConnection }}'
        sourceHost: '${{ parameters.sourceHost }}'
        sourceRepository: '${{ parameters.sourceRepository }}'
        sourceTag: '${{ parameters.sourceTag }}'
        targetRegistryServiceConnection: '${{ parameters.preRegistryServiceConnection }}'
        targetRegistryDisplayName: 'Login to Pre Registry'
        targetImageName: '$(fullPreVulnerableImageName)'
        targetRepository: '$(preVulnerableImageRepository)'
        targetTag: '$(vulnerableImageTag)'
        tagDisplayName: 'Tag Image as Vulnerable for Pre'
        pushDisplayName: 'Push Vulnerable Image to Pre Registry'

  - job: PushVulnerableImage
    displayName: 'Push Vulnerable Image to Live ACR'
    dependsOn: PushPreVulnerableImage
    pool:
      name: Tiberius
      demands:
      - ENVIRONMENT -equals BUS
    variables:
      vulnerableImageTag: '${{ parameters.sourceTag }}-vulnerable'
      vulnerableImageRepository: 'vulnerable/${{ parameters.sourceRepository }}'
      fullVulnerableImageName: '${{ parameters.destinationRegistry }}/vulnerable/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-vulnerable'
    steps:
    - template: steps/docker-copy-image.yml
      parameters:
        sourceRegistryServiceConnection: '${{ parameters.sourceRegistryServiceConnection }}'
        sourceHost: '${{ parameters.sourceHost }}'
        sourceRepository: '${{ parameters.sourceRepository }}'
        sourceTag: '${{ parameters.sourceTag }}'
        targetRegistryServiceConnection: '${{ parameters.destinationRegistryServiceConnection }}'
        targetRegistryDisplayName: 'Login to Destination Registry'
        targetImageName: '$(fullVulnerableImageName)'
        targetRepository: '$(vulnerableImageRepository)'
        targetTag: '$(vulnerableImageTag)'
        tagDisplayName: 'Tag Image as Vulnerable'
        pushDisplayName: 'Push Vulnerable Image'

  - job: SendFailureTeamsMessage
    displayName: 'Send Failure Alert to Teams Channel'
    dependsOn: [PushPreVulnerableImage, PushVulnerableImage]
    condition: and(always(), ne(stageDependencies.ScanContainer.ContainerScan.outputs['checkPreviousStatus.previousStatus'], 'vulnerable'))
    pool: Mare Nectaris
    variables:
      vulnerableImageTag: '${{ parameters.sourceTag }}-vulnerable'
      fullVulnerableImageName: '${{ parameters.destinationRegistry }}/vulnerable/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-vulnerable'
      fullPreVulnerableImageName: '${{ parameters.preRegistry }}/vulnerable/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}-vulnerable'
      previousStatus: $[ stageDependencies.ScanContainer.ContainerScan.outputs['checkPreviousStatus.previousStatus'] ]
    steps:
    - template: steps/send-teams-alert.yml
      parameters:
        teamsWebhookEndpoint: '${{ parameters.teamsWebhookEndpoint }}'
        payload:
          title: 'Container Scan Failed'
          message: 'Container scanning failed due to vulnerabilities detected in image: ${{ parameters.sourceHost }}/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}. Vulnerable images pushed to live and pre registries. Previous status: $(previousStatus).'
          previousStatus: '$(previousStatus)'
          status: 'failure'
          sourceHost: '${{ parameters.sourceHost }}'
          sourceRepository: '${{ parameters.sourceRepository }}'
          sourceTag: '${{ parameters.sourceTag }}'
          vulnerableImage: '$(fullVulnerableImageName)'
          preVulnerableImage: '$(fullPreVulnerableImageName)'
          pipelineUrl: '$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)'

