parameters:
  - name: sourceRegistryServiceConnection
    type: string
  - name: sourceHost
    type: string
  - name: sourceRepository
    type: string
  - name: sourceTag
    type: string
  - name: targetRegistryServiceConnection
    type: string
  - name: targetRegistryDisplayName
    type: string
  - name: targetImageName
    type: string
  - name: targetRepository
    type: string
  - name: targetTag
    type: string
  - name: tagDisplayName
    type: string
    default: 'Tag Image'
  - name: pushDisplayName
    type: string
    default: 'Push Image'

steps:
- task: Docker@2
  displayName: 'Login to Source Registry'
  inputs:
    containerRegistry: '${{ parameters.sourceRegistryServiceConnection }}'
    command: 'login'

- task: PowerShell@2
  displayName: 'Pull Published Image'
  inputs:
    targetType: 'inline'
    script: |
      docker pull ${{ parameters.sourceHost }}/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }}

- task: Docker@2
  displayName: '${{ parameters.targetRegistryDisplayName }}'
  inputs:
    containerRegistry: '${{ parameters.targetRegistryServiceConnection }}'
    command: 'login'

- task: Docker@2
  displayName: '${{ parameters.tagDisplayName }}'
  inputs:
    command: 'tag'
    arguments: '${{ parameters.sourceHost }}/${{ parameters.sourceRepository }}:${{ parameters.sourceTag }} ${{ parameters.targetImageName }}'

- task: Docker@2
  displayName: '${{ parameters.pushDisplayName }}'
  inputs:
    containerRegistry: '${{ parameters.targetRegistryServiceConnection }}'
    repository: '${{ parameters.targetRepository }}'
    command: 'push'
    tags: '${{ parameters.targetTag }}'
